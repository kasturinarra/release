workflow:
  as: baremetal-lab-upi-dual-stack-sno-lvms
  steps:
    pre:
      - chain: baremetal-lab-sno-conf
      - chain: baremetal-lab-upi-install
      - ref: upi-install-heterogeneous
      - ref: baremetal-lab-etcd-encryption
      - chain: storage-conf-csi-optional-topolvm
    post:
      - chain: baremetal-lab-post
      - ref: send-results-to-reportportal
    env:
      BOOTSTRAP_IN_PLACE: "true"
      ADDITIONAL_WORKERS: "0"
      ipv6_enabled: "true"
      PRIMARY_NET: "ipv4"
  documentation: |-
    The baremetal-lab-upi-dual-stack-sno-lvms workflow provides pre- and post- steps that provision and
    deprovision an SNO OpenShift cluster with IPv6 dual-stack configuration on a Baremetal lab
    and install the LVMS operator, allowing job authors to inject their own end-to-end test logic.
